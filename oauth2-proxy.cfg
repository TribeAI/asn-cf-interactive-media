# oauth2-proxy configuration for asn-cf-interactive-media.
#
# Non-secret defaults only. Secrets (client_id, client_secret, cookie_secret)
# and environment-specific URLs (oidc_issuer_url, redirect_url) are injected
# via OAUTH2_PROXY_* environment variables at runtime; see start.sh and the
# README "Auth0" section for the full list.
#
# Auth0 is an OIDC provider; tribe-google-workspace domain-locks logins to
# @tribe.ai accounts. email_domains here is belt-and-suspenders.

provider = "oidc"
provider_display_name = "Tribe Google SSO"

# Upstream is local nginx on 127.0.0.1:8081 (see nginx.conf).
upstreams = ["http://127.0.0.1:8081/"]

email_domains = ["tribe.ai"]

# Skip the oauth2-proxy intermediate sign-in page; go straight to Auth0.
skip_provider_button = true

# Bind addr is overridden via OAUTH2_PROXY_HTTP_ADDRESS at runtime so it
# can pick up Railway's $PORT.
http_address = "0.0.0.0:8080"

# Cookies — secure in prod, lax SameSite is fine for an SSO flow.
cookie_secure = true
cookie_samesite = "lax"
cookie_httponly = true
cookie_expire = "168h"
cookie_refresh = "1h"

# This is a static site + simple JSON API; we don't need to forward tokens.
pass_access_token = false
pass_authorization_header = false
pass_user_headers = true
set_xauthrequest = true

# Probes — local-only; nginx is the actual app.
ping_path = "/ping"
ready_path = "/ready"
silence_ping_logger = true

# Reverse-proxy mode so X-Forwarded-* headers from Railway's edge are trusted.
reverse_proxy = true
