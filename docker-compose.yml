services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # oauth2-proxy listens on $PORT inside the container; Railway will
      # set $PORT in prod, locally we pin it to 8080.
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
    volumes:
      # Mount the same CSV the legacy annotation service used so the
      # Tornado backend (running inside this container) can find it.
      - ./annotation/data:/data
