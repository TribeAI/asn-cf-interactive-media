services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - annotation

  annotation:
    build:
      context: ./annotation
    volumes:
      - ./annotation/data:/data
    environment:
      - CSV_PATH=/data/claims.csv
    expose:
      - "8888"
