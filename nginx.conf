# 15 requests/minute per IP — makes brute-forcing basic auth impractical
limit_req_zone $binary_remote_addr zone=auth:10m rate=15r/m;

upstream annotation_api {
    server annotation:8888;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Annotation API — proxied to Tornado backend
    location /annotation/api/ {
        limit_req zone=auth nodelay;
        limit_req_status 429;

        auth_basic "Content Freshness Visualizations";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://annotation_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static content
    location / {
        limit_req zone=auth nodelay;
        limit_req_status 429;

        auth_basic "Content Freshness Visualizations";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/html application/json text/css application/javascript;
    gzip_min_length 1000;
}
