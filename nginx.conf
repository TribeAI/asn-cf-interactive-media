# nginx sits behind oauth2-proxy on 127.0.0.1:8081. Auth0 (Google SSO) is
# enforced by oauth2-proxy upstream; nginx serves authenticated traffic only.
#
# 10 req/sec per IP with burst of 30 — generous enough for normal page loads
# (multiple JSON/asset fetches in parallel). Retained as a belt-and-suspenders
# defense against accidental floods / runaway clients.
#
# Note: with oauth2-proxy terminating connections, $binary_remote_addr is
# 127.0.0.1 for all traffic, so this currently rate-limits across all users
# collectively. If true per-user-IP limiting matters, add `set_real_ip_from
# 127.0.0.1; real_ip_header X-Forwarded-For;` so the limiter sees the edge IP.
limit_req_zone $binary_remote_addr zone=app:10m rate=10r/s;

upstream annotation_api {
    server 127.0.0.1:8888;
}

server {
    listen 127.0.0.1:8081;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Annotation API — proxied to Tornado backend
    location /annotation/api/ {
        limit_req zone=app burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://annotation_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static content
    location / {
        limit_req zone=app burst=30 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types application/json text/css application/javascript;
    gzip_min_length 1000;
}
